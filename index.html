<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Cálculo de Análises</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Cálculo de ATR</h1>
    <div class="sub">Insira os valores abaixo:</div>
  </header>

  <section class="card">
    <div class="row">
      <label class="field">
        <div class="label">PBU <span class="hint">110–260</span></div>
        <div class="input">
          <input id="pbu" type="number" inputmode="decimal" step="1" placeholder="ex.: 157.40">
        </div>
      </label>
      <label class="field">
        <div class="label">Brix do caldo <span class="hint">8–27</span></div>
        <div class="input">
          <input id="brix" type="number" inputmode="decimal" step="0.01" placeholder="ex.: 18.76">
          <span class="suffix">%</span>
        </div>
      </label>
    </div>

    <div class="row mt-10">
      <label class="field">
        <div class="label">Leitura sac.</div>
        <div class="input"><input id="ls" type="number" inputmode="decimal" step="0.01" placeholder="ex.: 60.78"></div>
      </label>
      <label class="field">
        <div class="label">Temperatura</div>
        <div class="input">
          <input id="temp" type="number" step="0.1" value="20">
          <span class="suffix">°C</span>
        </div>
      </label>
    </div>

    <div class="toolbar mt-12">
      <button class="btn" onclick="calc()">Calcular</button>
      <button class="btn ghost" onclick="limpar()">Limpar Campos</button>
    </div>
    <div id="msg" class="status"></div>
  </section>

  <section class="card" id="outputs" style="display:none;">
    <div class="out">
      <div class="kv"><h3>Pol. Caldo</h3><div class="val" id="polc"></div></div>
      <div class="kv"><h3>Pureza</h3><div class="val" id="pza"></div></div>
      <div class="kv"><h3>PCC</h3><div class="val" id="pcc"></div></div>
      <div class="kv"><h3>Fibra</h3><div class="val" id="fibra"></div></div>
      <div class="kv"><h3>ATR</h3><div class="val" id="atr"></div></div>
    </div>
  </section>

  <section class="card" id="historico" style="display:none; border-color: rgba(23,201,100,0.3);">
    <div class="label">Média da Rodada <span class="hint" id="count-analises">0 análises</span></div>
    
    <div class="out" style="grid-template-columns: 1fr; margin-bottom: 12px;">
      <div class="kv" style="background: rgba(23,201,100,0.05); border-color: rgba(23,201,100,0.2);">
        <h3>ATR Médio</h3>
        <div class="val" id="media-atr" style="color: var(--brand-2); font-size: 1.8rem;">—</div>
      </div>
    </div>

    <div class="toolbar">
      <button class="btn success" onclick="copiarMedia()">Copiar Média</button>
      <button class="btn ghost" onclick="limparRodada()">Zerar Rodada</button>
    </div>

    <div id="lista-analises" class="mt-12" style="font-size: 0.9rem; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 12px; max-height: 180px; overflow-y: auto;">
      </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
